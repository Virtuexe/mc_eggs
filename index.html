<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Egg Creator</title>
    <!-- Use a pixel art font -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mc-container">
        
        <header class="header mc-panel">
            <h1>Egg Texture Editor</h1>
            <p>Customize your 16x16 spawn eggs for Minecraft!</p>
        </header>

        <main class="workspace">
            <aside class="toolbar mc-panel">
                <h2>Inventory Tools</h2>
                
                <div class="tool-group">
                    <label>Base Texture</label>
                    <div class="mc-select-wrapper">
                        <select id="eggSwap" class="mc-select">
                            <option value="none">Empty Canvas</option>
                            <option value="egg.png">Standard Egg</option>
                            <option value="blue_egg.png">Blue Egg</option>
                            <option value="brown_egg.png">Brown Egg</option>
                        </select>
                    </div>
                </div>

                <div class="tool-group">
                    <label>Active Color</label>
                    <div class="color-controls">
                        <input type="color" id="colorPicker" value="#B02E26" title="Choose color">
                        <div class="alpha-control">
                            <label>Alpha/Opacity</label>
                            <div style="display:flex; align-items:center; gap: 5px;">
                                <input type="range" id="alphaSlider" min="0" max="1" step="0.05" value="1">
                                <span id="alphaValue">100%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tool-group">
                    <label>Minecraft Dyes Panel</label>
                    <div class="palette" id="quickColors">
                        <!-- Swatches injected via JS -->
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>Brush Settings</label>
                    <div class="mc-select-wrapper">
                        <select id="blendMode" class="mc-select">
                            <option value="source-over">Normal (Overwrite)</option>
                            <option value="multiply">Multiply (Keep Shadows)</option>
                            <option value="overlay">Overlay (Vibrant Shading)</option>
                            <option value="screen">Screen (Lighten Only)</option>
                        </select>
                    </div>
                </div>

                <div class="tool-group">
                    <label>Tools</label>
                    <div style="display: flex; gap: 10px;">
                        <button id="btnPencil" class="mc-btn active" style="flex:1;">Pencil</button>
                        <button id="btnEraser" class="mc-btn" style="flex:1;">Eraser</button>
                    </div>
                </div>

                <div class="tool-group">
                    <label>Actions</label>
                    <button id="btnShare" class="mc-btn share-btn" style="background-color: #5E7C16; color: white;">🔗 Copy Share Link</button>
                    <button id="btnClear" class="mc-btn danger-btn">Clear Canvas</button>
                    <button id="btnDownload" class="mc-btn success-btn">Download PNG</button>
                    
                    <div class="file-upload-wrapper">
                        <label for="imgLoader" class="mc-btn">Load Custom PNG...</label>
                        <input type="file" id="imgLoader" accept="image/png" style="display: none;">
                    </div>
                </div>
            </aside>
            
            <section class="canvas-area mc-panel">
                <div class="canvas-wrapper">
                    <!-- Minecraft checkerboard canvas bg -->
                    <div class="transparent-bg"></div>
                    <canvas id="eggCanvas" width="16" height="16"></canvas>
                    <div class="grid-overlay hidden" id="gridOverlay"></div>
                </div>
                
                <div class="canvas-controls">
                    <label class="mc-checkbox">
                        <input type="checkbox" id="toggleGrid" checked>
                        <span class="checkmark"></span>
                        Show Pixel Grid
                    </label>
                </div>
            </section>
        </main>

        <section class="advancement-panel mc-panel" style="margin-top: 1.5rem;">
            <h2>Datapack Advancement Generator <span style="font-size:1rem; font-style:italic;">(How to get this Egg)</span></h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem;">
                
                <div class="adv-settings">
                    <div class="tool-group" style="margin-bottom: 0;">
                        <label>Trigger Action</label>
                        <select id="advTrigger" class="mc-select" style="margin-bottom: 10px;">
                            <option value="consume_item">Player Eats Item</option>
                            <option value="location">Player Travels To Biome</option>
                            <option value="kill_entity">Player Kills Entity</option>
                        </select>

                        <label id="advConditionLabel">Target Item ID</label>
                        <input type="text" id="advCondition" class="mc-select" value="minecraft:apple" placeholder="e.g. minecraft:apple">

                        <label style="margin-top: 10px;">Reward Function (or Loot)</label>
                        <input type="text" id="advReward" class="mc-select" value="my_pack:give_custom_egg" placeholder="e.g. my_pack:give_egg">

                        <button id="btnGenerateAdv" class="mc-btn success-btn" style="margin-top: 15px;">Generate Advancement JSON</button>
                    </div>
                </div>

                <div class="adv-output">
                    <textarea id="advOutput" readonly style="width: 100%; height: 100%; min-height: 200px; background: #222; color: #55FF55; font-family: 'VT323', monospace; font-size: 1.25rem; padding: 10px; border: 4px solid #c6c6c6;" placeholder="// Generated JSON will appear here..."></textarea>
                </div>

            </div>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
